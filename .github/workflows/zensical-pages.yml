name: Build Zensical site and copy into landing

on:
  push:
    branches: [main]
    paths-ignore:
      - "landing/public/docs/**"
  workflow_dispatch:

jobs:
  build-and-copy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install Zensical
        run: |
          python -m pip install --upgrade pip
          pip install zensical

      - name: Build Zensical site
        working-directory: docs/zensical
        run: |
          zensical build

      - name: Copy site into landing/public/docs
        run: |
          rm -rf landing/public/docs || true
          mkdir -p landing/public
          cp -a docs/zensical/site landing/public/docs

      - name: Commit and push docs to main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add landing/public/docs
          if git diff --staged --quiet; then
            echo "No docs changes to commit"
          else
            git commit -m "chore(docs): update Zensical site [skip ci]" || true
            git push origin HEAD:main
          fi
