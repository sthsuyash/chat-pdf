name: doculume
version: "3.8"

services:
  # Jaeger for distributed tracing
  jaeger:
    image: jaegertracing/all-in-one:latest
    ports:
      - "5775:5775/udp" # Zipkin compact thrift
      - "6831:6831/udp" # Zipkin thrift
      - "6832:6832/udp" # Zipkin thrift
      - "5778:5778" # Config
      - "16686:16686" # UI
      - "14268:14268" # Collector HTTP
      - "14250:14250" # Collector gRPC
      - "9411:9411" # Zipkin
      - "4317:4317" # OTLP gRPC
      - "4318:4318" # OTLP HTTP
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    networks:
      - doculume-network

networks:
  doculume-network:
    external: true
