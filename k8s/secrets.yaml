apiVersion: v1
kind: Secret
metadata:
  name: doculume-secrets
  namespace: doculume
type: Opaque
stringData:
  # Database credentials
  POSTGRES_USER: "raguser"
  POSTGRES_PASSWORD: "CHANGE_ME_IN_PRODUCTION"
  POSTGRES_DB: "ragdb"

  # Redis password (optional)
  REDIS_PASSWORD: ""

  # JWT Secret (generate with: openssl rand -hex 32)
  JWT_SECRET_KEY: "CHANGE_ME_GENERATE_WITH_OPENSSL"
  JWT_ALGORITHM: "HS256"

  # Field-level encryption key (CRITICAL - MUST GENERATE)
  # Generate with: python -c "from cryptography.fernet import Fernet; print(Fernet.generate_key().decode())"
  ENCRYPTION_KEY: "GENERATE_WITH_FERNET_CRITICAL_SECURITY"

  # LLM API Keys
  OPENAI_API_KEY: "sk-REPLACE_WITH_YOUR_KEY"
  ANTHROPIC_API_KEY: ""
  GOOGLE_API_KEY: ""

  # OAuth2 Credentials (if using)
  GOOGLE_CLIENT_ID: ""
  GOOGLE_CLIENT_SECRET: ""
  GITHUB_CLIENT_ID: ""
  GITHUB_CLIENT_SECRET: ""
  OAUTH_REDIRECT_URL: "https://doculume.example.com/auth/callback"
---
apiVersion: v1
kind: Secret
metadata:
  name: postgres-credentials
  namespace: doculume
type: Opaque
stringData:
  username: "raguser"
  password: "CHANGE_ME_IN_PRODUCTION"
  database: "ragdb"
