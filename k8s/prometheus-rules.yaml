apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-rules
  namespace: doculume
data:
  alert-rules.yml: |
    groups:
      - name: backend_alerts
        interval: 30s
        rules:
          # High error rate
          - alert: HighErrorRate
            expr: |
              rate(http_requests_total{status=~"5.."}[5m]) / rate(http_requests_total[5m]) > 0.05
            for: 5m
            labels:
              severity: critical
              component: backend
            annotations:
              summary: "High error rate detected"
              description: "Error rate is {{ $value | humanizePercentage }} (threshold: 5%)"

          # Database connection pool exhausted
          - alert: DatabasePoolExhausted
            expr: db_pool_connections_available == 0
            for: 1m
            labels:
              severity: critical
              component: database
            annotations:
              summary: "Database connection pool exhausted"
              description: "No available database connections"

          # High latency
          - alert: HighLatency
            expr: histogram_quantile(0.95, http_request_duration_seconds) > 2
            for: 5m
            labels:
              severity: warning
              component: backend
            annotations:
              summary: "High API latency"
              description: "P95 latency is {{ $value }}s (threshold: 2s)"

          # High memory usage
          - alert: HighMemoryUsage
            expr: |
              container_memory_usage_bytes{pod=~"backend-.*"} / 
              container_spec_memory_limit_bytes{pod=~"backend-.*"} > 0.9
            for: 5m
            labels:
              severity: warning
              component: backend
            annotations:
              summary: "High memory usage"
              description: "Memory usage is {{ $value | humanizePercentage }} of limit"

          # High CPU usage
          - alert: HighCPUUsage
            expr: |
              rate(container_cpu_usage_seconds_total{pod=~"backend-.*"}[5m]) > 0.9
            for: 5m
            labels:
              severity: warning
              component: backend
            annotations:
              summary: "High CPU usage"
              description: "CPU usage is {{ $value | humanizePercentage }}"

          # Pod restart frequency
          - alert: FrequentPodRestarts
            expr: |
              rate(kube_pod_container_status_restarts_total{pod=~"backend-.*"}[15m]) > 0
            for: 5m
            labels:
              severity: warning
              component: backend
            annotations:
              summary: "Frequent pod restarts"
              description: "Pod {{ $labels.pod }} has restarted {{ $value }} times in 15m"

          # Redis connection failures
          - alert: RedisConnectionFailures
            expr: redis_connected_clients == 0
            for: 2m
            labels:
              severity: critical
              component: redis
            annotations:
              summary: "No Redis connections"
              description: "Redis has no connected clients"

          # Disk space low
          - alert: LowDiskSpace
            expr: |
              (node_filesystem_avail_bytes{mountpoint="/app/storage"} / 
               node_filesystem_size_bytes{mountpoint="/app/storage"}) < 0.1
            for: 5m
            labels:
              severity: warning
              component: storage
            annotations:
              summary: "Low disk space"
              description: "Available disk space is {{ $value | humanizePercentage }}"

          # Rate limiting activated frequently
          - alert: HighRateLimitHitRate
            expr: |
              rate(http_requests_total{status="429"}[5m]) / 
              rate(http_requests_total[5m]) > 0.1
            for: 10m
            labels:
              severity: info
              component: backend
            annotations:
              summary: "High rate limit hit rate"
              description: "{{ $value | humanizePercentage }} of requests are being rate limited"

          # Service down
          - alert: ServiceDown
            expr: up{job="backend"} == 0
            for: 1m
            labels:
              severity: critical
              component: backend
            annotations:
              summary: "Backend service is down"
              description: "Backend service has been down for 1 minute"

          # Database query slow
          - alert: SlowDatabaseQueries
            expr: |
              histogram_quantile(0.95, rate(db_query_duration_seconds_bucket[5m])) > 1
            for: 5m
            labels:
              severity: warning
              component: database
            annotations:
              summary: "Slow database queries"
              description: "P95 query time is {{ $value }}s (threshold: 1s)"
