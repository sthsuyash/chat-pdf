apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: doculume
  labels:
    app: backend
spec:
  type: ClusterIP
  ports:
    - port: 8000
      targetPort: 8000
      protocol: TCP
      name: http
  selector:
    app: backend
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: doculume
  labels:
    app: backend
spec:
  replicas: 3  # ⚠️ WARNING: With ReadWriteOnce PVC, only 1 pod can start!
              # See PVC configuration below for solutions
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z postgres 5432; do
                echo "Waiting for postgres..."
                sleep 2
              done
        - name: run-migrations
          image: ghcr.io/yourusername/doculume-backend:latest
          command:
            - sh
            - -c
            - uv run alembic upgrade head
          envFrom:
            - configMapRef:
                name: doculume-config
            - secretRef:
                name: doculume-secrets
          env:
            - name: DATABASE_URL
              value: "postgresql+asyncpg://$(POSTGRES_USER):$(POSTGRES_PASSWORD)@postgres:5432/$(POSTGRES_DB)"
      containers:
        - name: backend
          image: ghcr.io/yourusername/doculume-backend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
              name: http
          envFrom:
            - configMapRef:
                name: doculume-config
            - secretRef:
                name: doculume-secrets
          env:
            - name: DATABASE_URL
              value: "postgresql+asyncpg://$(POSTGRES_USER):$(POSTGRES_PASSWORD)@postgres:5432/$(POSTGRES_DB)"
            - name: REDIS_URL
              value: "redis://redis:6379/0"
            - name: CELERY_BROKER_URL
              value: "redis://redis:6379/1"
            - name: CELERY_RESULT_BACKEND
              value: "redis://redis:6379/2"
          volumeMounts:
            - name: storage
              mountPath: /app/storage
            - name: chroma-data
              mountPath: /app/chroma_data
          resources:
            requests:
              memory: "1Gi"
              cpu: "500m"
            limits:
              memory: "2Gi"
              cpu: "1000m"
          livenessProbe:
            httpGet:
              path: /api/v1/health/live
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/v1/health/ready
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
      volumes:
        - name: storage
          persistentVolumeClaim:
            claimName: backend-storage-pvc
        - name: chroma-data
          persistentVolumeClaim:
            claimName: chroma-data-pvc
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: backend-storage-pvc
  namespace: doculume
spec:
  accessModes:
    - ReadWriteOnce  # ⚠️ LIMITATION: Only ONE pod can mount this PVC
    # For multi-pod deployment (replicas > 1), use ONE of these alternatives:
    # OPTION 1 (RECOMMENDED): Use object storage (S3/GCS/Azure Blob)
    #   - Update app to use boto3/google-cloud-storage
    #   - Remove PVC volumes from deployment
    # OPTION 2: Use ReadWriteMany (requires NFS or cloud provider support)
    #   - Change to: ReadWriteMany
    #   - Ensure storageClassName supports RWX (e.g., efs-sc, azure-file)
    # OPTION 3: Reduce to 1 replica (NOT recommended for production)
    #   - Change replicas: 3 → 1 in deployment
  resources:
    requests:
      storage: 20Gi
  storageClassName: standard
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: chroma-data-pvc
  namespace: doculume
spec:
  accessModes:
    - ReadWriteOnce  # Changed from ReadWriteMany - use object storage (S3/GCS) for multi-pod access
  resources:
    requests:
      storage: 50Gi
  storageClassName: standard
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: backend-hpa
  namespace: doculume
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: backend
  minReplicas: 3
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
