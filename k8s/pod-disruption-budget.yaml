apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: backend-pdb
  namespace: doculume
  labels:
    app: backend
spec:
  minAvailable: 2  # Keep at least 2 pods running during disruptions (node drains, upgrades)
  selector:
    matchLabels:
      app: backend
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: frontend-pdb
  namespace: doculume
  labels:
    app: frontend
spec:
  minAvailable: 1  # Keep at least 1 frontend pod running
  selector:
    matchLabels:
      app: frontend
