name: doculume

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: raguser
      POSTGRES_PASSWORD: ragpass
      POSTGRES_DB: ragdb
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U raguser"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - doculume-network

  # Redis Cache
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - doculume-network

  # Monitoring (optional profile)
  prometheus:
    image: prom/prometheus:latest
    profiles: ["monitoring"]
    ports:
      - "9090:9090"
    volumes:
      - ./backend/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
    networks:
      - doculume-network

  grafana:
    image: grafana/grafana:latest
    profiles: ["monitoring"]
    ports:
      - "3002:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_INSTALL_PLUGINS=grafana-piechart-panel
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - doculume-network

  node-exporter:
    image: prom/node-exporter:latest
    profiles: ["monitoring"]
    ports:
      - "9100:9100"
    networks:
      - doculume-network

  redis-exporter:
    image: oliver006/redis_exporter:latest
    profiles: ["monitoring"]
    ports:
      - "9121:9121"
    environment:
      - REDIS_ADDR=redis:6379
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - doculume-network

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:latest
    profiles: ["monitoring"]
    ports:
      - "9187:9187"
    environment:
      - DATA_SOURCE_NAME=postgresql://raguser:ragpass@postgres:5432/ragdb?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - doculume-network

  # Tracing (optional profile)
  jaeger:
    image: jaegertracing/all-in-one:latest
    profiles: ["tracing"]
    ports:
      - "5775:5775/udp"
      - "6831:6831/udp"
      - "6832:6832/udp"
      - "5778:5778"
      - "16686:16686"
      - "14268:14268"
      - "14250:14250"
      - "9411:9411"
      - "4317:4317"
      - "4318:4318"
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    networks:
      - doculume-network

  # Note:
  # This compose file intentionally includes infrastructure services only.
  # Run backend/frontend directly on host for local development, or use hosted services.

volumes:
  postgres_data:
  redis_data:
  prometheus_data:
  grafana_data:

networks:
  doculume-network:
    driver: bridge
